name: Compile CV

on:
  pull_request:
    branches:
      - main
    paths:
      - "cv/cv-talvin-ackbaraly.tex"
      - ".github/workflows/compile-cv.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv/cv-talvin-ackbaraly.tex
          latexmk_use_lualatex: false
          args: -pdf -interaction=nonstopmode -halt-on-error

      - name: Move PDF to assets/
        run: |
          mkdir -p assets
          mv cv-talvin-ackbaraly.pdf assets/cv-talvin-ackbaraly.pdf

      - name: Commit and push PDF
        if: github.event_name == 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update compiled CV"
          file_pattern: "assets/cv-talvin-ackbaraly.pdf"
