<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Talvin Ackbaraly — Ingénieur Vision & IA</title>
  <meta
    name="description"
    content="Portfolio de Talvin Ackbaraly, étudiant ingénieur à l'EPITA spécialisé en vision par ordinateur, IA, Deep Learning et calcul GPU."
  />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Talvin Ackbaraly — Ingénieur Vision & IA" />
  <meta
    property="og:description"
    content="Étudiant ingénieur à l'EPITA spécialisé en vision par ordinateur, IA, Deep Learning et calcul GPU. En recherche de stage — février 2027."
  />
  <meta property="og:locale" content="fr_FR" />

  <!-- Favicon -->
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <!-- Styles -->
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- ─── Navigation ─── -->
  <nav class="nav" id="nav" aria-label="Navigation principale">
    <div class="nav__inner container">
      <a href="#hero" class="nav__logo" aria-label="Retour à l'accueil">TA</a>
      <ul class="nav__links" role="list">
        <li><a href="#about">À propos</a></li>
        <li><a href="#experience">Expériences</a></li>
        <li><a href="#projects">Projets</a></li>
        <li><a href="#skills">Compétences</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
      <div class="nav__controls">
        <button
          class="nav__lang-toggle"
          id="lang-toggle"
          aria-label="Changer de langue"
          type="button"
        >
          <span class="lang-text">EN</span>
        </button>
        <button
          class="nav__theme-toggle"
          id="theme-toggle"
          aria-label="Basculer le thème clair/sombre"
          type="button"
        >
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
      <button
        class="nav__burger"
        id="nav-burger"
        aria-label="Ouvrir le menu"
        aria-expanded="false"
        type="button"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- ─── Mobile Menu Overlay ─── -->
  <div class="mobile-menu" id="mobile-menu" aria-hidden="true">
    <ul class="mobile-menu__links" role="list">
      <li><a href="#about">À propos</a></li>
      <li><a href="#experience">Expériences</a></li>
      <li><a href="#projects">Projets</a></li>
      <li><a href="#skills">Compétences</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </div>

  <main>
    <!-- ─── Hero ─── -->
    <section id="hero" class="hero">
      <div class="container hero__inner">
        <p class="hero__greeting">Bonjour, je suis</p>
        <h1 class="hero__name" id="hero-name"></h1>
        <p class="hero__headline" id="hero-headline"></p>
        <p class="hero__status" id="hero-status"></p>
        <div class="hero__actions" id="hero-actions"></div>
      </div>
      <div class="hero__scroll-indicator">
        <a href="#about" aria-label="Défiler vers le bas">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </a>
      </div>
    </section>

    <!-- ─── About ─── -->
    <section id="about" class="section">
      <div class="container">
        <h2 class="section__title">À propos</h2>
        <div class="section__divider"></div>
        <p class="about__intro" id="about-intro"></p>
        <div class="about__education" id="about-education"></div>
        <div class="about__certifications" id="about-certifications"></div>
      </div>
    </section>

    <!-- ─── Experience ─── -->
    <section id="experience" class="section section--alt">
      <div class="container">
        <h2 class="section__title">Expériences professionnelles</h2>
        <div class="section__divider"></div>
        <div class="experience__list" id="experience-list"></div>
      </div>
    </section>

    <!-- ─── Projects ─── -->
    <section id="projects" class="section">
      <div class="container">
        <h2 class="section__title">Projets</h2>
        <div class="section__divider"></div>
        <div class="projects__grid" id="projects-grid"></div>
      </div>
    </section>

    <!-- ─── Skills ─── -->
    <section id="skills" class="section section--alt">
      <div class="container">
        <h2 class="section__title">Compétences</h2>
        <div class="section__divider"></div>
        <div class="skills__grid" id="skills-grid"></div>
      </div>
    </section>

    <!-- ─── Contact ─── -->
    <section id="contact" class="section">
      <div class="container contact__inner">
        <h2 class="section__title">Discutons</h2>
        <div class="section__divider"></div>
        <p class="contact__text" id="contact-text"></p>
        <div class="contact__links" id="contact-links"></div>
      </div>
    </section>
  </main>

  <!-- ─── Footer ─── -->
  <footer class="footer">
    <div class="container footer__inner">
      <div class="footer__brand">
        <span class="footer__logo">TA</span>
        <span class="footer__name">Talvin Ackbaraly</span>
      </div>
      <ul class="footer__links" id="footer-links" role="list"></ul>
      <p class="footer__copy">&copy; <span id="footer-year"></span> Talvin Ackbaraly</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script type="module" src="/js/main.js"></script>
</body>
</html>
